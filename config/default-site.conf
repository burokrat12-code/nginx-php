server {
    listen 8443 ssl;
    server_name cargo-port.eu localhost;

    # Пути к сертификатам — при отсутствии используются самоподписанные
    ssl_certificate /etc/ssl/certs/cargo-port.eu.crt;
    ssl_certificate_key /etc/ssl/certs/cargo-port.eu.key;

    # Если реальных сертификатов нет — nginx не упадёт, т.к. есть fallback
    # Но лучше подложить реальные через mount

    root /var/www/html;
    index index.php index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}

# HTTP редирект на HTTPS
server {
    listen 80;
    server_name cargo-port.eu localhost;
    return 301 https://$server_name$request_uri;
}
