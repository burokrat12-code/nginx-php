worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

# Блок stream для TCP/UDP проксирования на основе SNI
stream {
    # Карта для чтения имени сервера из SNI без расшифровки TLS
    map $ssl_preread_server_name $target_backend {
        vpn.example.com      vpn_backend;     # Направляем VPN на один порт
        web.example.com      web_backend;     # Направляем веб-трафик на другой
        default              web_backend;
    }

    upstream vpn_backend {
        server 192.168.88.1:1194; # IP вашего VPN-сервера в локальной сети
    }

    upstream web_backend {
        server 127.0.0.1:8443;    # Локальный HTTPS-сервер Nginx
    }

    server {
        listen 443;
        proxy_pass $target_backend;
        ssl_preread on; # Включаем чтение SNI
    }
}

# Блок http для обычного веб-сервера и PHP
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 8443 ssl;
        server_name web.example.com;

        ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
        ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;

        root /var/www/html;
        index index.php index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        location ~ \.php$ {
            fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }
    }
}
